name: Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install CPU-only PyTorch
        # Install CPU wheel first so CI does not download 2 GB CUDA binaries
        run: |
          pip install torch==2.1.2 torchvision==0.16.2 --index-url https://download.pytorch.org/whl/cpu

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Smoke-test data package import
        run: |
          python - <<'EOF'
          import traceback, sys
          try:
              import medai_medsam.data
              from medai_medsam.data.dataset import BUSIDataset
              from medai_medsam.data.transforms import get_train_transforms
              print("data package imports OK")
          except Exception:
              traceback.print_exc()
              sys.exit(1)
          EOF

      - name: Run pytest
        run: pytest tests/ -v --cov=src/medai_medsam --cov-report=xml --cov-fail-under=70

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
